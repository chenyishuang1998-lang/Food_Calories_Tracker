<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Calorie" />
  <meta name="description" content="Track your daily calories with ease" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <title>Calorie</title>
  <style>
    :root {
      --bg: #ffffff;
      --surface: #f8f8f7;
      --surface2: #f0efed;
      --border: #e8e7e4;
      --border-dark: #d4d2cc;
      --text: #1a1917;
      --muted: #8a8680;
      --green: #16a34a;
      --red: #dc2626;
      --amber: #d97706;
      --blue: #2563eb;
      --r: 10px;
      --r-sm: 6px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: calc(env(safe-area-inset-bottom) + 24px);
    }

    /* Header */
    .header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(255,255,255,0.94);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 0 20px; height: 56px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo { font-size: 16px; font-weight: 500; letter-spacing: -0.3px; }
    .header-right { display: flex; align-items: center; gap: 2px; }
    .icon-btn {
      width: 36px; height: 36px; border-radius: var(--r-sm);
      border: none; background: transparent; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--muted); font-size: 18px; transition: all 0.12s;
      font-family: inherit;
    }
    .icon-btn:hover, .icon-btn.active { background: var(--surface2); color: var(--text); }
    .date-nav { display: flex; align-items: center; gap: 0; }
    .date-label { font-size: 13px; color: var(--muted); min-width: 62px; text-align: center; }

    /* Pages */
    .page { display: none; }
    .page.active { display: block; }
    .main { padding: 20px; max-width: 560px; margin: 0 auto; }

    /* Stats hero */
    .stats-hero { display: flex; align-items: center; gap: 20px; padding: 20px 0 14px; }
    .ring-wrap { position: relative; width: 80px; height: 80px; flex-shrink: 0; }
    .ring-wrap svg { transform: rotate(-90deg); }
    .ring-bg { fill: none; stroke: var(--surface2); stroke-width: 6; }
    .ring-fill { fill: none; stroke-width: 6; stroke-linecap: round; transition: stroke-dashoffset 0.5s ease, stroke 0.3s; }
    .ring-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .ring-num { font-size: 16px; font-weight: 500; letter-spacing: -0.5px; font-family: 'DM Mono', monospace; }
    .ring-unit { font-size: 9px; color: var(--muted); letter-spacing: 0.5px; text-transform: uppercase; }
    .stats-meta { flex: 1; min-width: 0; }
    .stats-title { font-size: 22px; font-weight: 300; letter-spacing: -0.8px; line-height: 1.1; margin-bottom: 5px; }
    .stats-title strong { font-weight: 500; }
    .stats-sub { font-size: 13px; color: var(--muted); }
    .stats-sub .hi { color: var(--green); }
    .stats-sub .lo { color: var(--red); }

    .stat-pills { display: flex; gap: 6px; margin-bottom: 20px; flex-wrap: wrap; }
    .pill {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 99px; padding: 4px 11px;
      font-size: 12px; color: var(--muted);
      display: flex; align-items: center; gap: 4px;
    }
    .pill strong { color: var(--text); font-weight: 500; font-family: 'DM Mono', monospace; }
    .pill.green strong { color: var(--green); }
    .pill.red strong { color: var(--red); }

    .divider { height: 1px; background: var(--border); margin: 0 0 14px; }

    /* Meal sections */
    .meal-section { margin-bottom: 2px; }
    .meal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 0; cursor: pointer; user-select: none;
    }
    .meal-header-left { display: flex; align-items: center; gap: 10px; }
    .meal-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .meal-name { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.7px; color: var(--muted); }
    .meal-kcal { font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; }
    .meal-arrow { font-size: 11px; color: var(--border-dark); transition: transform 0.2s; display: inline-block; }
    .meal-arrow.open { transform: rotate(90deg); }

    .meal-items { border-radius: var(--r); overflow: hidden; margin-bottom: 2px; border: 1px solid var(--border); }
    .food-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 14px; background: var(--bg);
      border-bottom: 1px solid var(--border);
      animation: slideIn 0.15s ease;
    }
    .food-item:last-child { border-bottom: none; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(-3px); } to { opacity: 1; transform: none; } }
    .food-emoji { font-size: 17px; min-width: 24px; text-align: center; }
    .food-name-text { flex: 1; font-size: 14px; }
    .food-kcal { font-size: 12px; font-family: 'DM Mono', monospace; color: var(--muted); min-width: 48px; text-align: right; }
    .food-del { background: none; border: none; cursor: pointer; color: var(--border-dark); font-size: 13px; padding: 2px 6px; transition: color 0.12s; }
    .food-del:hover { color: var(--red); }
    .empty-meal { padding: 13px 14px; font-size: 13px; color: var(--muted); font-style: italic; }

    /* Add section */
    .add-section { margin-top: 22px; }
    .section-label { font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 10px; }

    .photo-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
    .photo-btn {
      display: flex; align-items: center; justify-content: center; gap: 7px;
      background: var(--surface); border: 1px dashed var(--border-dark);
      border-radius: var(--r); padding: 13px 10px;
      cursor: pointer; font-family: inherit; font-size: 13px; font-weight: 400;
      color: var(--muted); transition: all 0.12s; width: 100%;
    }
    .photo-btn:hover { border-color: var(--text); color: var(--text); background: var(--surface2); }
    .photo-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    #photoInput, #albumInput { display: none; }

    input, select {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r-sm); color: var(--text);
      font-family: inherit; font-size: 14px;
      padding: 10px 12px; width: 100%;
      outline: none; transition: border-color 0.12s, background 0.12s;
      -webkit-appearance: none; appearance: none;
    }
    input:focus, select:focus { border-color: var(--text); background: var(--bg); }
    input::placeholder { color: var(--muted); }

    .input-row { display: flex; gap: 8px; margin-bottom: 8px; }
    .input-short { max-width: 86px; flex-shrink: 0; }

    .btn-row { display: flex; gap: 8px; }
    .btn {
      flex: 1; border: 1px solid var(--border); border-radius: var(--r-sm);
      padding: 10px; font-family: inherit; font-size: 13px; font-weight: 500;
      cursor: pointer; transition: all 0.12s; background: var(--surface); color: var(--text);
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .btn:hover { background: var(--surface2); border-color: var(--border-dark); }
    .btn-primary { background: var(--text); color: #fff; border-color: var(--text); }
    .btn-primary:hover { opacity: 0.82; }

    /* Settings sheet */
    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.12);
      backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
      z-index: 200; display: none; align-items: flex-end; justify-content: center;
    }
    .overlay.open { display: flex; }
    .sheet {
      background: #fff; border-radius: 18px 18px 0 0;
      padding: 0 20px calc(env(safe-area-inset-bottom) + 24px);
      width: 100%; max-width: 560px;
      animation: sheetUp 0.22s ease;
    }
    @keyframes sheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .sheet-handle { width: 32px; height: 3px; background: var(--border-dark); border-radius: 99px; margin: 14px auto 20px; }
    .sheet-title { font-size: 15px; font-weight: 500; margin-bottom: 16px; }
    .setting-row {
      display: flex; align-items: flex-start; justify-content: space-between;
      padding: 12px 0; border-bottom: 1px solid var(--border); gap: 12px;
    }
    .setting-row:last-of-type { border-bottom: none; }
    .setting-label { font-size: 14px; font-weight: 400; }
    .setting-desc { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .key-status { font-size: 12px; font-family: 'DM Mono', monospace; text-align: right; }
    .key-status.set { color: var(--green); }
    .key-status.unset { color: var(--muted); }
    .btn-text { background: none; border: none; cursor: pointer; font-family: inherit; font-size: 13px; color: var(--blue); padding: 0; }
    #keyInputWrap { display: none; padding: 10px 0 4px; }
    .key-input-row { display: flex; gap: 8px; }
    .key-input-row input { font-size: 12px; font-family: 'DM Mono', monospace; }
    .btn-sm { background: var(--text); color: #fff; border: none; border-radius: var(--r-sm); padding: 0 14px; height: 40px; cursor: pointer; font-size: 13px; font-family: inherit; white-space: nowrap; }
    .btn-sm.ghost { background: transparent; color: var(--red); border: 1px solid var(--border); }
    .key-hint { font-size: 11px; color: var(--muted); margin-top: 6px; }

    /* Calendar page */
    .cal-top { display: flex; align-items: center; justify-content: space-between; padding: 16px 0 12px; }
    .cal-month-label { font-size: 15px; font-weight: 500; }
    .cal-nav { display: flex; gap: 4px; }
    .cal-nav-btn {
      width: 30px; height: 30px; border: 1px solid var(--border); border-radius: var(--r-sm);
      background: var(--surface); cursor: pointer; font-size: 15px; color: var(--muted);
      display: flex; align-items: center; justify-content: center;
    }
    .cal-nav-btn:hover { background: var(--surface2); color: var(--text); }

    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; margin-bottom: 20px; }
    .cal-day-label { font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.4px; color: var(--muted); text-align: center; padding: 4px 0 6px; }
    .cal-cell {
      aspect-ratio: 1; border-radius: var(--r-sm);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      cursor: pointer; transition: background 0.1s; gap: 2px;
    }
    .cal-cell:hover:not(.empty) { background: var(--surface2); }
    .cal-cell.empty { cursor: default; }
    .cal-cell.today { background: var(--surface); }
    .cal-cell.selected { background: var(--text) !important; }
    .c-num { font-size: 13px; line-height: 1; }
    .cal-cell.selected .c-num { color: #fff; }
    .cal-cell.today .c-num { font-weight: 600; }
    .c-dot { width: 4px; height: 4px; border-radius: 50%; }
    .cal-cell.selected .c-dot { opacity: 0.6; }

    /* Trend chart */
    .trend-section { margin-bottom: 20px; }
    .trend-label { font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 10px; }
    .chart-area { height: 72px; display: flex; align-items: flex-end; gap: 3px; }
    .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; }
    .bar-fill { width: 100%; border-radius: 3px 3px 0 0; min-height: 2px; cursor: pointer; transition: opacity 0.12s; }
    .bar-fill:hover { opacity: 0.75; }
    .bar-x { font-size: 9px; color: var(--muted); }

    /* Goal line */
    .goal-line-wrap { position: relative; margin-bottom: 4px; }

    /* Day detail */
    .day-detail { background: var(--surface); border-radius: var(--r); padding: 14px 16px; }
    .day-detail-header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 10px; }
    .day-detail-date { font-size: 13px; font-weight: 500; }
    .day-detail-cal { font-size: 18px; font-weight: 300; letter-spacing: -0.5px; font-family: 'DM Mono', monospace; }
    .detail-item { display: flex; align-items: center; gap: 8px; padding: 5px 0; border-bottom: 1px solid var(--border); }
    .detail-item:last-child { border-bottom: none; }
    .d-emoji { font-size: 15px; min-width: 22px; }
    .d-name { flex: 1; font-size: 13px; }
    .d-kcal { font-size: 12px; font-family: 'DM Mono', monospace; color: var(--muted); }
    .detail-empty { font-size: 13px; color: var(--muted); font-style: italic; }

    /* Spinner */
    .spinner { display: inline-block; width: 13px; height: 13px; border: 2px solid var(--border-dark); border-top-color: var(--text); border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Toast */
    .toast {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      background: var(--text); color: #fff;
      padding: 9px 18px; border-radius: 99px; font-size: 13px;
      z-index: 999; white-space: nowrap; pointer-events: none;
      animation: toastIn 0.18s ease;
    }
    @keyframes toastIn { from { opacity:0; transform: translateX(-50%) translateY(6px); } to { opacity:1; transform: translateX(-50%) translateY(0); } }
  </style>
</head>
<body>

<div class="header">
  <div class="logo" onclick="showPage('tracker')" style="cursor:pointer">Calorie</div>
  <div class="header-right">
    <div class="date-nav" id="dateNavWrap">
      <button class="icon-btn" onclick="changeDay(-1)">‹</button>
      <span class="date-label" id="dateLabel">Today</span>
      <button class="icon-btn" onclick="changeDay(1)">›</button>
    </div>
    <button class="icon-btn" id="calPageBtn" onclick="toggleCalendar()" title="History">&#128197;</button>
    <button class="icon-btn" onclick="openSettings()" title="Settings">&#9881;</button>
  </div>
</div>

<!-- Tracker page -->
<div class="page active" id="page-tracker">
  <div class="main">
    <div class="stats-hero">
      <div class="ring-wrap">
        <svg width="80" height="80" viewBox="0 0 80 80">
          <circle class="ring-bg" cx="40" cy="40" r="33"/>
          <circle class="ring-fill" id="ringFill" cx="40" cy="40" r="33" stroke-dasharray="207.3" stroke-dashoffset="207.3" stroke="#1a1917"/>
        </svg>
        <div class="ring-center">
          <span class="ring-num" id="ringNum">0</span>
          <span class="ring-unit">kcal</span>
        </div>
      </div>
      <div class="stats-meta">
        <div class="stats-title" id="heroTitle">0 <strong>/ 2000</strong> kcal</div>
        <div class="stats-sub" id="heroSub">No food logged yet</div>
      </div>
    </div>

    <div class="stat-pills">
      <div class="pill"><strong id="pillGoal">2000</strong>&nbsp;goal</div>
      <div class="pill" id="pillRemain"><strong id="pillRemainNum">2000</strong>&nbsp;left</div>
      <div class="pill"><strong id="pillCount">0</strong>&nbsp;items</div>
    </div>

    <div class="divider"></div>
    <div id="mealsContainer"></div>

    <div class="add-section">
      <div class="section-label">Add food</div>
      <input type="file" id="photoInput" accept="image/jpeg,image/png" capture="environment" onchange="handlePhoto(event)" />
      <div class="photo-row">
        <button class="photo-btn" id="cameraBtn" onclick="openCamera()">
          <span id="cameraBtnInner">📷 Take Photo</span>
        </button>
        <button class="photo-btn" id="albumBtn" onclick="document.getElementById('photoInput').click()">
          <span id="albumBtnInner">🖼️ From Library</span>
        </button>
      </div>
      <!-- Camera stream modal -->
      <div id="cameraModal" style="display:none;position:fixed;inset:0;background:#000;z-index:300;flex-direction:column;align-items:center;justify-content:center;">
        <video id="cameraStream" autoplay playsinline style="width:100%;max-height:70vh;object-fit:cover;"></video>
        <div style="display:flex;gap:16px;padding:24px;">
          <button onclick="closeCamera()" style="flex:1;padding:14px;background:rgba(255,255,255,0.2);border:none;border-radius:10px;color:white;font-size:15px;font-family:inherit;">Cancel</button>
          <button onclick="snapPhoto()" id="snapBtn" style="flex:2;padding:14px;background:white;border:none;border-radius:10px;color:#000;font-size:15px;font-weight:500;font-family:inherit;">⬤ Capture</button>
        </div>
      </div>
      <div class="input-row">
        <input type="text" id="foodName" placeholder="Food name" />
        <input type="number" id="foodCal" placeholder="kcal" min="0" class="input-short" />
      </div>
      <div class="input-row" style="margin-bottom:10px">
        <select id="mealType">
          <option value="breakfast">🌅 Breakfast</option>
          <option value="lunch" selected>☀️ Lunch</option>
          <option value="dinner">🌙 Dinner</option>
          <option value="snack">🍪 Snack</option>
        </select>
        <select id="goalSel" onchange="updateGoal(this.value)">
          <option value="1500">Goal · 1500</option>
          <option value="1800">Goal · 1800</option>
          <option value="2000" selected>Goal · 2000</option>
          <option value="2200">Goal · 2200</option>
          <option value="2500">Goal · 2500</option>
        </select>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="addFood()">Add</button>
        <button class="btn" onclick="askAI()">Ask AI ↗</button>
      </div>
    </div>
  </div>
</div>

<!-- Calendar page -->
<div class="page" id="page-calendar">
  <div class="main">
    <div class="cal-top">
      <div class="cal-month-label" id="calMonthLabel"></div>
      <div class="cal-nav">
        <button class="cal-nav-btn" onclick="changeCalMonth(-1)">‹</button>
        <button class="cal-nav-btn" onclick="changeCalMonth(1)">›</button>
      </div>
    </div>
    <div class="cal-grid" id="calGrid"></div>
    <div class="trend-section">
      <div class="trend-label">14-day trend</div>
      <div class="chart-area" id="trendChart"></div>
    </div>
    <div id="dayDetail" style="display:none" class="day-detail"></div>
  </div>
</div>

<!-- Settings sheet -->
<div class="overlay" id="settingsOverlay" onclick="closeSettingsIfBg(event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Settings</div>

    <!-- AI Provider selector -->
    <div class="setting-row">
      <div class="setting-label">AI Provider</div>
      <select id="providerSel" onchange="switchProvider(this.value)" style="width:140px">
        <option value="anthropic">Anthropic (Claude)</option>
        <option value="gemini">Google Gemini</option>
      </select>
    </div>

    <!-- Anthropic key -->
    <div class="setting-row" id="anthropicRow">
      <div>
        <div class="setting-label">Anthropic API Key</div>
        <div class="setting-desc"><a href="https://console.anthropic.com" target="_blank" style="color:var(--blue)">console.anthropic.com ↗</a></div>
      </div>
      <div style="text-align:right">
        <div class="key-status unset" id="anthropicStatus">Not set</div>
        <button class="btn-text" onclick="toggleKeyInput('anthropic')" style="margin-top:3px" id="anthropicToggleBtn">Set key</button>
      </div>
    </div>
    <div id="anthropicKeyWrap" style="display:none">
      <div class="key-input-row">
        <input type="password" id="anthropicKeyInput" placeholder="sk-ant-…" autocomplete="off" />
        <button class="btn-sm" onclick="saveKey('anthropic')">Save</button>
        <button class="btn-sm ghost" onclick="clearKey('anthropic')">Clear</button>
      </div>
      <div class="key-hint">Stored locally on device only</div>
    </div>

    <!-- Gemini key -->
    <div class="setting-row" id="geminiRow" style="display:none">
      <div>
        <div class="setting-label">Gemini API Key</div>
        <div class="setting-desc"><a href="https://aistudio.google.com" target="_blank" style="color:var(--blue)">aistudio.google.com ↗</a> · Free</div>
      </div>
      <div style="text-align:right">
        <div class="key-status unset" id="geminiStatus">Not set</div>
        <button class="btn-text" onclick="toggleKeyInput('gemini')" style="margin-top:3px" id="geminiToggleBtn">Set key</button>
      </div>
    </div>
    <div id="geminiKeyWrap" style="display:none">
      <div class="key-input-row">
        <input type="password" id="geminiKeyInput" placeholder="AIza…" autocomplete="off" />
        <button class="btn-sm" onclick="saveKey('gemini')">Save</button>
        <button class="btn-sm ghost" onclick="clearKey('gemini')">Clear</button>
      </div>
      <div class="key-hint">Stored locally on device only</div>
    </div>

    <div class="setting-row">
      <div class="setting-label">Daily goal</div>
      <select id="goalSheetSel" onchange="updateGoal(this.value)" style="width:130px">
        <option value="1500">1500 kcal</option>
        <option value="1800">1800 kcal</option>
        <option value="2000">2000 kcal</option>
        <option value="2200">2200 kcal</option>
        <option value="2500">2500 kcal</option>
      </select>
    </div>

    <div style="padding-top:16px">
      <button class="btn btn-primary" onclick="closeSettings()" style="width:100%">Done</button>
    </div>
  </div>
</div>

<script>
// ── Date helpers (timezone-safe) ──────────────────────────────────────────────
// Always use local wall-clock date, never UTC
function localDateKey(date) {
  const d = date || new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function todayKey() { return localDateKey(new Date()); }

function keyByOffset(off) {
  const d = new Date();
  d.setDate(d.getDate() + off);
  return localDateKey(d);
}

function labelByOffset(off) {
  if (off === 0) return 'Today';
  if (off === -1) return 'Yesterday';
  const d = new Date(); d.setDate(d.getDate() + off);
  return `${d.getMonth()+1}/${d.getDate()}`;
}

// Auto-detect date change (fixes "still showing yesterday" bug)
let _lastKnownDay = todayKey();
function checkDayRollover() {
  const now = todayKey();
  if (now !== _lastKnownDay) {
    _lastKnownDay = now;
    // Reset offset to today when date rolls over
    if (offset !== 0) { /* keep if user is browsing history */ }
    else { render(); }
  }
}
setInterval(checkDayRollover, 60_000); // check every minute
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') checkDayRollover();
});

// ── State ─────────────────────────────────────────────────────────────────────
const MEALS = [
  { key:'breakfast', label:'Breakfast', color:'#fb923c' },
  { key:'lunch',     label:'Lunch',     color:'#facc15' },
  { key:'dinner',    label:'Dinner',    color:'#818cf8' },
  { key:'snack',     label:'Snack',     color:'#86efac' },
];
const EMOJI_MAP = {
  rice:'🍚', noodle:'🍜', bread:'🍞', egg:'🥚', chicken:'🍗', beef:'🥩',
  fish:'🐟', shrimp:'🦐', tofu:'🫘', salad:'🥗', soup:'🥣', milk:'🥛',
  coffee:'☕', cola:'🥤', juice:'🧃', fries:'🍟', burger:'🍔', pizza:'🍕',
  cake:'🎂', cookie:'🍪', apple:'🍎', banana:'🍌', orange:'🍊', sushi:'🍣',
  ramen:'🍜', dumpling:'🥟', yogurt:'🫙',
};

let offset = 0;
let goal = parseInt(localStorage.getItem('calGoal') || '2000');
let openMeals = { breakfast:true, lunch:true, dinner:true, snack:false };
let currentPage = 'tracker';
let calYear, calMonth, selectedDate;

// ── Storage ───────────────────────────────────────────────────────────────────
function getData(key) { try { return JSON.parse(localStorage.getItem(key)||'[]'); } catch { return []; } }
function saveData(key, d) { localStorage.setItem(key, JSON.stringify(d)); }

function getEmoji(name) {
  const n = name.toLowerCase();
  for (const [k,v] of Object.entries(EMOJI_MAP)) if (n.includes(k)) return v;
  return '🍽️';
}

// ── Day navigation ────────────────────────────────────────────────────────────
function changeDay(dir) {
  if (offset + dir > 0) return;
  offset += dir;
  render();
}

function updateGoal(v) {
  goal = parseInt(v);
  localStorage.setItem('calGoal', goal);
  ['goalSel','goalSheetSel'].forEach(id => {
    const el = document.getElementById(id); if (el) el.value = goal;
  });
  render();
}

// ── Tracker render ────────────────────────────────────────────────────────────
function render() {
  document.getElementById('dateLabel').textContent = labelByOffset(offset);
  ['goalSel','goalSheetSel'].forEach(id => {
    const el = document.getElementById(id); if (el) el.value = goal;
  });

  const key = keyByOffset(offset);
  const data = getData(key);
  const total = data.reduce((s,f) => s + f.cal, 0);
  const pct = Math.min(1, total / goal);
  const remain = goal - total;
  const circ = 2 * Math.PI * 33;

  document.getElementById('ringNum').textContent = total;
  const ring = document.getElementById('ringFill');
  ring.style.strokeDashoffset = circ - circ * pct;
  ring.style.stroke = pct >= 1 ? '#dc2626' : pct >= 0.8 ? '#d97706' : '#1a1917';

  document.getElementById('heroTitle').innerHTML = `${total} <strong>/ ${goal}</strong> kcal`;
  const sub = document.getElementById('heroSub');
  if (total === 0) { sub.textContent = 'No food logged yet'; sub.className = 'stats-sub'; }
  else if (remain > 0) { sub.innerHTML = `<span class="hi">${remain} kcal remaining</span>`; }
  else { sub.innerHTML = `<span class="lo">${Math.abs(remain)} kcal over goal</span>`; }

  document.getElementById('pillGoal').textContent = goal;
  document.getElementById('pillRemainNum').textContent = Math.abs(remain);
  const rp = document.getElementById('pillRemain');
  rp.className = 'pill' + (remain < 0 ? ' red' : (remain < goal * 0.2 ? ' green' : ''));
  document.getElementById('pillCount').textContent = data.length;

  const container = document.getElementById('mealsContainer');
  container.innerHTML = '';
  MEALS.forEach(({ key:mkey, label, color }) => {
    const items = data.filter(f => f.meal === mkey);
    const sub = items.reduce((s,f) => s + f.cal, 0);
    const isOpen = openMeals[mkey];
    const sec = document.createElement('div');
    sec.className = 'meal-section';
    sec.innerHTML = `
      <div class="meal-header" onclick="toggleMeal('${mkey}')">
        <div class="meal-header-left">
          <span class="meal-dot" style="background:${color}"></span>
          <span class="meal-name">${label}</span>
          ${sub > 0 ? `<span class="meal-kcal">${sub}</span>` : ''}
        </div>
        <span class="meal-arrow ${isOpen?'open':''}">›</span>
      </div>
      ${isOpen ? `<div class="meal-items">
        ${items.length === 0
          ? '<div class="empty-meal">Nothing logged yet</div>'
          : items.map(f => `
            <div class="food-item">
              <span class="food-emoji">${f.emoji||'🍽️'}</span>
              <span class="food-name-text">${f.name}</span>
              <span class="food-kcal">${f.cal}</span>
              <button class="food-del" onclick="deleteFood(${f.id})">✕</button>
            </div>`).join('')}
      </div>` : ''}
    `;
    container.appendChild(sec);
  });
}

function addFood() {
  const name = document.getElementById('foodName').value.trim();
  const cal = parseInt(document.getElementById('foodCal').value);
  const meal = document.getElementById('mealType').value;
  if (!name) { showToast('Enter a food name'); return; }
  if (isNaN(cal) || cal < 0) { showToast('Enter calories'); return; }
  const key = keyByOffset(offset);
  const data = getData(key);
  data.push({ id: Date.now(), name, cal, meal, emoji: getEmoji(name) });
  saveData(key, data);
  document.getElementById('foodName').value = '';
  document.getElementById('foodCal').value = '';
  openMeals[meal] = true;
  render();
  showToast('Added');
}

function deleteFood(id) {
  const key = keyByOffset(offset);
  saveData(key, getData(key).filter(f => f.id !== id));
  render();
}

function toggleMeal(k) { openMeals[k] = !openMeals[k]; render(); }

// ── Photo / AI ────────────────────────────────────────────────────────────────
async function handlePhoto(event) {
  const file = event.target.files[0];
  if (!file) return;

  const provider = localStorage.getItem('aiProvider') || 'anthropic';
  const apiKey = localStorage.getItem(provider + 'Key');
  if (!apiKey) { openSettings(); showToast('Set your API key first'); return; }

  // Show loading
  document.getElementById('albumBtnInner').innerHTML = '<span class="spinner"></span> Identifying…';
  document.getElementById('albumBtn').disabled = true;
  document.getElementById('cameraBtn').disabled = true;

  try {
    const base64 = await fileToBase64(file);
    const mediaType = 'image/jpeg';

    // Route through Vercel proxy to avoid CORS
    const res = await fetch('/api/recognize', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ provider, apiKey, base64, mediaType })
    });
    const parsed = await res.json();
    if (!res.ok) throw new Error(parsed.error || 'Server error');

    if (parsed.items?.length) {
      const meal = document.getElementById('mealType').value;
      const key = keyByOffset(offset);
      const existing = getData(key);
      parsed.items.forEach(item => {
        existing.push({ id: Date.now()+Math.random(), name:item.name, cal:item.cal, meal, emoji:item.emoji||getEmoji(item.name) });
      });
      saveData(key, existing);
      openMeals[meal] = true;
      render();
      showToast(`Found ${parsed.items.length} item${parsed.items.length>1?'s':''}`);
    } else { showToast('No food detected — try again'); }
  } catch(e) {
    console.error('Photo error:', e);
    const msg = e?.message || e?.toString() || 'Unknown error';
    showToast(msg.slice(0, 100));
  } finally {
    document.getElementById('albumBtnInner').innerHTML = '🖼️ From Library';
    document.getElementById('cameraBtn').disabled = false;
    document.getElementById('albumBtn').disabled = false;
    event.target.value = '';
  }
}

async function fileToBase64(file) {
  // Check file size - warn if over 5MB
  if (file.size > 5 * 1024 * 1024) {
    throw new Error('Photo too large — please use a smaller image (under 5MB)');
  }

  // Read as data URL first (most compatible on iOS PWA)
  const dataUrl = await new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => resolve(e.target.result);
    reader.onerror = () => reject(new Error('FileReader failed'));
    reader.readAsDataURL(file);
  });

  // Then draw onto canvas to resize + convert to JPEG
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      try {
        const MAX = 800;
        let w = img.width, h = img.height;
        if (w > MAX || h > MAX) {
          if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
          else { w = Math.round(w * MAX / h); h = MAX; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        const out = canvas.toDataURL('image/jpeg', 0.82);
        resolve(out.split(',')[1]);
      } catch(e) { reject(new Error('Resize failed: ' + e.message)); }
    };
    img.onerror = () => reject(new Error('Could not decode image'));
    img.src = dataUrl;
  });
}


function askAI() {
  const name = document.getElementById('foodName').value.trim();
  const q = name
    ? `How many calories in "${name}"? Quick estimate in kcal for a typical serving.`
    : 'What are rough calorie counts for common meals? Give me a quick list in kcal.';
  window.open(`https://claude.ai/new?q=${encodeURIComponent(q)}`, '_blank');
}

// ── Settings ──────────────────────────────────────────────────────────────────
function openSettings() {
  refreshKeyStatus();
  document.getElementById('goalSheetSel').value = goal;
  const provider = localStorage.getItem('aiProvider') || 'anthropic';
  document.getElementById('providerSel').value = provider;
  switchProvider(provider);
  document.getElementById('settingsOverlay').classList.add('open');
}
function closeSettings() { document.getElementById('settingsOverlay').classList.remove('open'); }
function closeSettingsIfBg(e) { if (e.target === document.getElementById('settingsOverlay')) closeSettings(); }

function switchProvider(provider) {
  localStorage.setItem('aiProvider', provider);
  document.getElementById('anthropicRow').style.display = provider === 'anthropic' ? 'flex' : 'none';
  document.getElementById('geminiRow').style.display = provider === 'gemini' ? 'flex' : 'none';
  document.getElementById('anthropicKeyWrap').style.display = 'none';
  document.getElementById('geminiKeyWrap').style.display = 'none';
}

function refreshKeyStatus() {
  ['anthropic', 'gemini'].forEach(p => {
    const has = !!localStorage.getItem(p + 'Key');
    const el = document.getElementById(p + 'Status');
    el.textContent = has ? '● Set' : 'Not set';
    el.className = 'key-status ' + (has ? 'set' : 'unset');
    document.getElementById(p + 'ToggleBtn').textContent = has ? 'Change' : 'Set key';
  });
}

function toggleKeyInput(provider) {
  const wrap = document.getElementById(provider + 'KeyWrap');
  wrap.style.display = wrap.style.display === 'none' ? 'block' : 'none';
}

function saveKey(provider) {
  const input = document.getElementById(provider + 'KeyInput');
  const v = input.value.trim();
  if (provider === 'anthropic' && !v.startsWith('sk-ant-')) {
    showToast('Anthropic key should start with sk-ant-'); return;
  }
  if (provider === 'gemini' && !v.startsWith('AIza')) {
    showToast('Gemini key should start with AIza'); return;
  }
  localStorage.setItem(provider + 'Key', v);
  input.value = '';
  document.getElementById(provider + 'KeyWrap').style.display = 'none';
  refreshKeyStatus();
  showToast('API key saved');
}

function clearKey(provider) {
  localStorage.removeItem(provider + 'Key');
  document.getElementById(provider + 'KeyInput').value = '';
  document.getElementById(provider + 'KeyWrap').style.display = 'none';
  refreshKeyStatus();
  showToast('Key cleared');
}

// ── Jump to a specific date in tracker ───────────────────────────────────────
function jumpToDate(dateKey) {
  const today = new Date();
  const target = new Date(dateKey + 'T00:00:00');
  const diffMs = target - new Date(today.getFullYear(), today.getMonth(), today.getDate());
  const diffDays = Math.round(diffMs / 86400000);
  offset = diffDays;
  showPage('tracker');
}

// ── Page switching ────────────────────────────────────────────────────────────
function showPage(p) {
  currentPage = p;
  document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
  document.getElementById('page-' + p).classList.add('active');
  document.getElementById('calPageBtn').classList.toggle('active', p === 'calendar');
  document.getElementById('dateNavWrap').style.display = p === 'tracker' ? 'flex' : 'none';
  if (p === 'calendar') {
    const now = new Date();
    calYear = now.getFullYear(); calMonth = now.getMonth();
    selectedDate = todayKey();
    renderCalendar(); renderTrend(); renderDayDetail(selectedDate);
  } else {
    render();
  }
}

function toggleCalendar() {
  showPage(currentPage === 'calendar' ? 'tracker' : 'calendar');
}

// ── Calendar ──────────────────────────────────────────────────────────────────
function changeCalMonth(dir) {
  calMonth += dir;
  if (calMonth < 0) { calMonth = 11; calYear--; }
  if (calMonth > 11) { calMonth = 0; calYear++; }
  renderCalendar();
}

function renderCalendar() {
  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const DAYS = ['Su','Mo','Tu','We','Th','Fr','Sa'];
  document.getElementById('calMonthLabel').textContent = `${MONTHS[calMonth]} ${calYear}`;

  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';
  DAYS.forEach(d => {
    const el = document.createElement('div');
    el.className = 'cal-day-label'; el.textContent = d;
    grid.appendChild(el);
  });

  const today = todayKey(); // timezone-safe
  const firstDow = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();

  for (let i = 0; i < firstDow; i++) {
    const el = document.createElement('div'); el.className = 'cal-cell empty';
    grid.appendChild(el);
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const dateKey = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const data = getData(dateKey);
    const total = data.reduce((s,f) => s + f.cal, 0);

    const el = document.createElement('div');
    el.className = 'cal-cell'
      + (dateKey === today ? ' today' : '')
      + (dateKey === selectedDate ? ' selected' : '');

    const numEl = document.createElement('div');
    numEl.className = 'c-num'; numEl.textContent = d;
    el.appendChild(numEl);

    if (total > 0) {
      const dot = document.createElement('div');
      dot.className = 'c-dot';
      dot.style.background = total > goal ? '#dc2626' : total > goal*0.8 ? '#d97706' : '#16a34a';
      el.appendChild(dot);
    }

    el.onclick = () => {
      if (selectedDate === dateKey) {
        jumpToDate(dateKey);
      } else {
        selectedDate = dateKey; renderCalendar(); renderDayDetail(dateKey);
      }
    };
    grid.appendChild(el);
  }
}

function renderTrend() {
  const chart = document.getElementById('trendChart');
  chart.innerHTML = '';
  const days = [];
  for (let i = 13; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    const key = localDateKey(d); // timezone-safe
    const total = getData(key).reduce((s,f) => s+f.cal, 0);
    days.push({ label: d.getDate(), total, key });
  }
  const max = Math.max(...days.map(d => d.total), goal, 1);

  days.forEach(day => {
    const col = document.createElement('div'); col.className = 'bar-col';
    const bar = document.createElement('div'); bar.className = 'bar-fill';
    const h = day.total > 0 ? Math.max(4, Math.round(day.total / max * 64)) : 2;
    bar.style.height = h + 'px';
    bar.style.background = day.total === 0 ? '#e8e7e4'
      : day.total > goal ? '#fca5a5'
      : day.total > goal * 0.8 ? '#fcd34d' : '#86efac';
    bar.title = `${day.total} kcal`;
    bar.onclick = () => {
      if (selectedDate === day.key) {
        jumpToDate(day.key);
      } else {
        selectedDate = day.key; renderCalendar(); renderDayDetail(day.key);
      }
    };
    const lbl = document.createElement('div'); lbl.className = 'bar-x'; lbl.textContent = day.label;
    col.appendChild(bar); col.appendChild(lbl);
    chart.appendChild(col);
  });
}

function renderDayDetail(dateKey) {
  const el = document.getElementById('dayDetail');
  const data = getData(dateKey);
  const total = data.reduce((s,f) => s + f.cal, 0);
  const [y,m,d] = dateKey.split('-').map(Number);
  const label = new Date(y, m-1, d).toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' });

  el.style.display = 'block';
  el.innerHTML = `
    <div class="day-detail-header" onclick="jumpToDate('${dateKey}')" style="cursor:pointer" title="Open this day">
      <div class="day-detail-date">${label} <span style="font-size:11px;color:var(--muted)">↗</span></div>
      <div class="day-detail-cal">${total} kcal</div>
    </div>
    ${data.length === 0
      ? '<div class="detail-empty">No food logged</div>'
      : data.map(f => `
        <div class="detail-item">
          <span class="d-emoji">${f.emoji||'🍽️'}</span>
          <span class="d-name">${f.name}</span>
          <span class="d-kcal">${f.cal}</span>
        </div>`).join('')}
  `;
}

// ── Camera stream ────────────────────────────────────────────────────────────
let cameraStream = null;

async function openCamera() {
  const modal = document.getElementById('cameraModal');
  modal.style.display = 'flex';
  try {
    cameraStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 960 } }
    });
    document.getElementById('cameraStream').srcObject = cameraStream;
  } catch(e) {
    closeCamera();
    // Fallback to file input camera
    document.getElementById('photoInput').click();
  }
}

function closeCamera() {
  if (cameraStream) { cameraStream.getTracks().forEach(t => t.stop()); cameraStream = null; }
  document.getElementById('cameraModal').style.display = 'none';
}

async function snapPhoto() {
  const video = document.getElementById('cameraStream');
  const canvas = document.createElement('canvas');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0);
  closeCamera();

  const provider = localStorage.getItem('aiProvider') || 'anthropic';
  const apiKey = localStorage.getItem(provider + 'Key');
  if (!apiKey) { openSettings(); showToast('Set your API key first'); return; }

  document.getElementById('cameraBtnInner').innerHTML = '<span class="spinner"></span> Identifying…';
  document.getElementById('cameraBtn').disabled = true;
  document.getElementById('albumBtn').disabled = true;

  try {
    const base64 = canvas.toDataURL('image/jpeg', 0.85).split(',')[1];
    const res = await fetch('/api/recognize', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ provider, apiKey, base64, mediaType: 'image/jpeg' })
    });
    const parsed = await res.json();
    if (!res.ok) throw new Error(parsed.error || 'Server error');
    if (parsed.items?.length) {
      const meal = document.getElementById('mealType').value;
      const key = keyByOffset(offset);
      const existing = getData(key);
      parsed.items.forEach(item => {
        existing.push({ id: Date.now()+Math.random(), name:item.name, cal:item.cal, meal, emoji:item.emoji||getEmoji(item.name) });
      });
      saveData(key, existing);
      openMeals[meal] = true;
      render();
      showToast(`Found ${parsed.items.length} item${parsed.items.length>1?'s':''}`);
    } else { showToast('No food detected — try again'); }
  } catch(e) {
    console.error(e);
    showToast(e.message?.slice(0,80) || 'Recognition failed');
  } finally {
    document.getElementById('cameraBtnInner').innerHTML = '📷 Take Photo';
    document.getElementById('cameraBtn').disabled = false;
    document.getElementById('albumBtn').disabled = false;
  }
}

// ── Toast ─────────────────────────────────────────────────────────────────────
function showToast(msg) {
  document.querySelectorAll('.toast').forEach(t => t.remove());
  const t = document.createElement('div');
  t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2000);
}

// ── Service Worker ────────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});

// ── Init ──────────────────────────────────────────────────────────────────────
refreshKeyStatus();
render();
</script>
